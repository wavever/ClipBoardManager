name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (Release)
        run: |
          xcodebuild \
            -project ClipTrace.xcodeproj \
            -scheme ClipTrace \
            -configuration Release \
            -derivedDataPath build \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app into dmg
        id: package
        run: |
          APP_PATH="build/Build/Products/Release/ClipTrace.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="ClipTrace-${VERSION}.dmg"
          STAGING=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "ClipTrace" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"
          echo "dmg=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${{ steps.package.outputs.dmg }}"
